openapi: 3.1.0
info:
  title: api
  description: ""
  license:
    name: ""
  version: 0.1.0
paths:
  /auth/google:
    post:
      operationId: auth_google
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthGoogleInput'
        required: true
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "401":
          description: unauthorized error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/login/email:
    post:
      operationId: login_by_email
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginEmailInput'
        required: true
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "401":
          description: unauthorized error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/register/email:
    post:
      operationId: register_by_email
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterEmailInput'
        required: true
      responses:
        "201":
          description: ""
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "400":
          description: invalid email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    AuthGoogleInput:
      type: object
      required:
        - id_token
        - device_info
      properties:
        device_info:
          $ref: '#/components/schemas/DeviceInfoInput'
        id_token:
          type: string
    AuthResponse:
      type: object
      required:
        - user
        - access_token
        - refresh_token
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        user:
          $ref: '#/components/schemas/UserResponse'
    DeviceInfoInput:
      type: object
      required:
        - os
      properties:
        device_name:
          type:
            - string
            - "null"
        model_name:
          type:
            - string
            - "null"
        os:
          type: string
    ErrorCode:
      type: string
      enum:
        - EMAIL_ALREADY_EXISTS
        - INVALID_EMAIL
        - INVALID_PASSWORD
        - INVALID_DISPLAY_NAME
        - RATE_LIMIT_EXCEEDED
        - SESSION_CREATION_FAILED
        - INTERNAL_ERROR
        - UNAUTHORIZED
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          type: string
    LoginEmailInput:
      type: object
      required:
        - email
        - password
        - device_info
      properties:
        device_info:
          $ref: '#/components/schemas/DeviceInfoInput'
        email:
          type: string
        password:
          type: string
    RegisterEmailInput:
      type: object
      required:
        - display_name
        - email
        - password
        - device_info
      properties:
        device_info:
          $ref: '#/components/schemas/DeviceInfoInput'
        display_name:
          type: string
        email:
          type: string
        password:
          type: string
    UserResponse:
      type: object
      required:
        - id
        - display_name
        - role
      properties:
        display_name:
          type: string
        id:
          type: integer
          format: int64
        role:
          type: string
