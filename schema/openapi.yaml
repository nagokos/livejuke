openapi: 3.1.0
info:
  title: api
  description: ""
  license:
    name: ""
  version: 0.1.0
paths:
  /auth/email:
    patch:
      operationId: update_email
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEmailInput'
        required: true
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
        "400":
          description: invalid email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: unauthorized error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/email/send-code:
    post:
      operationId: send_code
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendCodeInput'
        required: true
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendCodeResponse'
        "400":
          description: invalid email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "429":
          description: too many request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/email/verify-code:
    post:
      operationId: verify_code
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyCodeInput'
        required: true
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "400":
          description: invalid email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: unauthorized error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/google:
    post:
      operationId: auth_google
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthGoogleInput'
        required: true
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "401":
          description: unauthorized error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout:
    post:
      operationId: logout
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutInput'
        required: true
      responses:
        "204":
          description: ""
        "401":
          description: unauthorized error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/refresh:
    post:
      operationId: auth_refresh
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRefreshInput'
        required: true
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "401":
          description: unauthorized error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me:
    get:
      operationId: get_me
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAuthDetailResponse'
        "401":
          description: unauthorized error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      operationId: update_me
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateInput'
        required: true
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
        "400":
          description: invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: unauthorized error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/avatar:
    patch:
      operationId: update_avatar
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
        "401":
          description: unauthorized error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/avatar/presigned_uri:
    post:
      operationId: presigned_uri
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserAvatarUpdateInput'
        required: true
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignedUriResponse'
        "400":
          description: invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: unauthorized error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    AuthGoogleInput:
      type: object
      required:
        - id_token
        - device_info
      properties:
        device_info:
          $ref: '#/components/schemas/DeviceInfoInput'
        id_token:
          type: string
    AuthRefreshInput:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
    AuthResponse:
      type: object
      required:
        - access_token
        - refresh_token
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
    AuthStatusResponse:
      type: object
      required:
        - is_google_linked
        - is_email_linked
      properties:
        is_email_linked:
          type: boolean
        is_google_linked:
          type: boolean
    CurrentUserResponse:
      type: object
      required:
        - id
        - display_name
        - email
        - role
      properties:
        avatar_url:
          type:
            - string
            - "null"
        display_name:
          type: string
        email:
          type: string
        id:
          type: integer
          format: int64
        role:
          type: string
    DeviceInfoInput:
      type: object
      required:
        - os
      properties:
        device_name:
          type:
            - string
            - "null"
        model_name:
          type:
            - string
            - "null"
        os:
          type: string
    ErrorCode:
      type: string
      enum:
        - INVALID_EMAIL
        - INVALID_DISPLAY_NAME
        - INVALID_VERIFICATION_CODE
        - INVALID_ACCESS_TOKEN
        - INVALID_REFRESH_TOKEN
        - INVALID_MEDIA_TYPE
        - EMAIL_ALREADY_IN_USE
        - USER_NOT_FOUND
        - GLOBAL_RATE_LIMITED
        - SEND_CODE_RATE_LIMITED
        - SESSION_CREATION_FAILED
        - NO_UPDATES_PROVIDED
        - INTERNAL_ERROR
        - UNAUTHORIZED
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          type: string
    LogoutInput:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
    PresignedUriResponse:
      type: object
      required:
        - presigned_uri
      properties:
        presigned_uri:
          type: string
    SendCodeInput:
      type: object
      required:
        - email
      properties:
        email:
          type: string
    SendCodeResponse:
      type: object
      required:
        - resend_cooldown_seconds
      properties:
        resend_cooldown_seconds:
          type: integer
          format: int32
          minimum: 0
    UpdateEmailInput:
      type: object
      required:
        - code
        - email
      properties:
        code:
          type: string
        email:
          type: string
    UserAuthDetailResponse:
      type: object
      required:
        - user
        - auth_status
      properties:
        auth_status:
          $ref: '#/components/schemas/AuthStatusResponse'
        user:
          $ref: '#/components/schemas/CurrentUserResponse'
    UserAvatarUpdateInput:
      type: object
      required:
        - media_type
      properties:
        media_type:
          type: string
    UserUpdateInput:
      type: object
      required:
        - display_name
      properties:
        display_name:
          type: string
    VerifyCodeInput:
      type: object
      required:
        - email
        - code
        - device_info
      properties:
        code:
          type: string
        device_info:
          $ref: '#/components/schemas/DeviceInfoInput'
        email:
          type: string
