---
services:
  postgres:
    image: postgres:17
    container_name: livejuke-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: livejuke
      POSTGRES_USER: livejuke
      POSTGRES_PASSWORD: livejuke
      TZ: Asia/Tokyo

    ports:
      - "5432:5432"

    volumes:
      - livejuke_pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U livejuke -d livejuke"]
      interval: 5s
      timeout: 3s
      retries: 10
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
  mailhog:
    image: mailhog/mailhog
    container_name: mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  livejuke_pgdata:
