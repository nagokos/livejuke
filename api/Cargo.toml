[package]
name = "api"
version = "0.1.0"
edition = "2024"

[dependencies]
# web
tokio = { version = "1.50", features = ["full"] }
axum = "0.8"
tower-http = { version = "0.6", features = ["trace"] }

# log
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# db
postgres = "0.19"
sqlx = "0.8"

# error
thiserror = "2"
anyhow = "1"
